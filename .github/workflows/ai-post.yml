# Generates an AI-written DRAFT blog post (RU + EN) twice a week and commits it.
# Drafts never appear on the site until you flip draft -> false in the CMS.
# Requires repo secret: ANTHROPIC_API_KEY  (Settings -> Secrets and variables -> Actions)
name: AI blog post (draft)

on:
  schedule:
    - cron: '0 9 * * 1,4'   # Mon & Thu, 09:00 UTC
  workflow_dispatch:         # lets you run it manually from the Actions tab

permissions:
  contents: write

concurrency:
  group: ai-post
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Generate draft post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/generate-post.mjs
      - name: Commit draft
        run: |
          git config user.name "ai-writer[bot]"
          git config user.email "ai-writer@users.noreply.github.com"
          if [ -n "$(git status --porcelain src/content/blog)" ]; then
            git add src/content/blog
            git commit -m "AI draft post ($(date +%F))"
            git push
          else
            echo "No new post to commit."
          fi
