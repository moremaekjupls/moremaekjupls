# Pages CMS config — edit the blog in a browser admin, no markdown files.
# Connect this repo at https://app.pagescms.org  ·  docs: https://pagescms.org/docs
media:
  input: public
  output: /
content:
  - name: posts
    label: Blog posts
    type: collection
    path: src/content/blog
    filename: '{fields.transId}.{fields.lang}.md'
    view:
      fields: [title, lang, pubDate, draft]
      primary: title
      sort: [pubDate]
    fields:
      - name: title
        label: Title
        type: string
      - name: excerpt
        label: Excerpt (short summary shown in the list)
        type: text
      - name: pubDate
        label: Publish date
        type: date
        options:
          format: yyyy-MM-dd
      - name: lang
        label: Language
        type: select
        options:
          values: [ru, en]
        default: ru
      - name: transId
        label: Post ID (SAME in the RU and EN version — this is the URL)
        type: string
        pattern:
          regex: '^[a-z0-9-]+$'
          message: 'Lowercase letters, numbers and dashes only.'
      - name: draft
        label: Draft (hide from site)
        type: boolean
        default: false
      - name: body
        label: Body
        type: rich-text
settings:
  content:
    merge: true
